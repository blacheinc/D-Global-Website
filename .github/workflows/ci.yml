name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Manual trigger from the Actions UI — useful for re-running after a
  # flake or revalidating a branch after env/secret changes.
  workflow_dispatch:

# Least-privilege: the job only reads the repo and writes nothing back.
# A compromised dependency can't ghost-write to main, create tags, etc.
permissions:
  contents: read

# Cancel in-flight runs for the same PR ref when new commits land. For
# main branch pushes we let every run finish — losing a CI result on a
# main commit creates an audit gap ("was this commit ever green?").
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    name: Lint, typecheck, build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Build needs to know enough env to import lib/env without throwing.
      # These are placeholder values that satisfy zod's production refinement
      # when `next build` runs with NODE_ENV=production — none are real
      # secrets, just shapes the validator accepts.
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public
      NEXT_PUBLIC_SITE_URL: https://example.com
      NEXT_PUBLIC_WHATSAPP_NUMBER: '233241234567'
      QR_SECRET: ci-build-qr-secret-not-a-real-key
      AUTH_SECRET: ci-build-auth-secret-not-a-real-key
      PAYSTACK_MODE: link
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      # `cache: pnpm` omitted intentionally: setup-node v4 hard-errors when
      # no pnpm-lock.yaml exists. Once a lockfile is committed, add
      # `cache: pnpm` back to this step AND flip the install to
      # --frozen-lockfile so CI matches developer installs byte-for-byte.
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      # Cache Next.js's incremental compile output. The cache key rotates on
      # dep or source changes; restore-keys lets a stale cache still seed
      # the build (Next re-validates what it keeps).
      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package.json') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx', '!node_modules/**', '!.next/**') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package.json') }}-
            ${{ runner.os }}-nextjs-

      # Prisma client is generated by the postinstall hook above. No
      # second `prisma generate` here — it would just run again and waste
      # ~3 seconds on every run.
      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
